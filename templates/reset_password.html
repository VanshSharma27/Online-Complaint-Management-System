<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS · Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f1117; --surface: #181b23; --surface2: #1e2230;
            --border: rgba(255,255,255,0.07);
            --accent: #4f7cff; --accent-soft: rgba(79,124,255,0.1); --accent-glow: rgba(79,124,255,0.22);
            --success: #34c97a; --danger: #f05454;
            --text: #e2e4ed; --text-dim: #8b8fa8; --text-faint: #4a4d5e;
            --success-soft: rgba(52,201,122,0.1); --danger-soft: rgba(240,84,84,0.1);
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; align-items: center;
            justify-content: center; overflow-x: hidden;
        }
        .bg-glow { position: fixed; border-radius: 50%; filter: blur(110px); pointer-events: none; z-index: 0; }
        .g1 { width: 400px; height: 400px; background: rgba(52,201,122,0.07); top: -100px; right: -80px; animation: gdrift 18s ease-in-out infinite; }
        .g2 { width: 280px; height: 280px; background: rgba(79,124,255,0.06); bottom: -60px; left: -40px; animation: gdrift 22s ease-in-out infinite reverse; }
        @keyframes gdrift { 0%,100%{transform:translate(0,0)} 50%{transform:translate(14px,-14px)} }
        .bg-grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: linear-gradient(rgba(255,255,255,0.013) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.013) 1px, transparent 1px);
            background-size: 54px 54px;
        }

        .wrapper {
            position: relative; z-index: 10;
            width: 100%; max-width: 420px; padding: 1.5rem;
            animation: slideUp 0.55s cubic-bezier(0.16,1,0.3,1) both;
        }
        @keyframes slideUp { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }

        .icon-wrap {
            width: 60px; height: 60px; border-radius: 18px;
            background: linear-gradient(135deg, var(--accent), #6741d9);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; margin: 0 auto 1.25rem;
            box-shadow: 0 0 0 1px rgba(79,124,255,0.25), 0 10px 28px rgba(79,124,255,0.18);
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 2.25rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .card-title { font-weight: 800; font-size: 1.3rem; letter-spacing: -0.02em; margin-bottom: 0.3rem; }
        .card-sub { color: var(--text-dim); font-size: 0.82rem; line-height: 1.65; margin-bottom: 1.75rem; }

        .flash-msg {
            padding: 0.65rem 0.9rem; border-radius: 10px;
            font-size: 0.8rem; margin-bottom: 1.1rem;
            display: flex; align-items: center; gap: 0.5rem; text-align: left;
            animation: flashIn 0.3s ease;
        }
        @keyframes flashIn { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:translateY(0)} }
        .flash-success { background: var(--success-soft); border: 1px solid rgba(52,201,122,0.2); color: var(--success); }
        .flash-danger  { background: var(--danger-soft);  border: 1px solid rgba(240,84,84,0.2);  color: var(--danger); }

        .form-group { margin-bottom: 1.1rem; text-align: left; }
        label {
            display: block; font-size: 0.7rem; font-weight: 700;
            color: var(--text-dim); text-transform: uppercase;
            letter-spacing: 0.07em; margin-bottom: 0.4rem;
        }
        .input-wrap { position: relative; }
        .input-wrap i.field-icon {
            position: absolute; left: 0.95rem; top: 50%;
            transform: translateY(-50%);
            color: var(--text-faint); font-size: 0.88rem;
            pointer-events: none; transition: color 0.2s;
        }
        .input-wrap:focus-within i.field-icon { color: var(--accent); }
        .toggle-pw {
            position: absolute; right: 0.95rem; top: 50%;
            transform: translateY(-50%);
            color: var(--text-faint); font-size: 0.95rem;
            cursor: pointer; transition: color 0.2s; background: none; border: none; padding: 0;
        }
        .toggle-pw:hover { color: var(--accent); }

        input[type="password"], input[type="text"] {
            width: 100%; background: var(--surface2);
            border: 1px solid var(--border); border-radius: 11px;
            padding: 0.82rem 2.8rem 0.82rem 2.6rem;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.88rem;
            transition: all 0.22s; outline: none;
        }
        input::placeholder { color: var(--text-faint); }
        input:focus {
            border-color: var(--accent);
            background: var(--accent-soft);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* Match indicator */
        .match-indicator {
            margin-top: 0.35rem;
            font-size: 0.72rem;
            display: flex; align-items: center; gap: 0.3rem;
            min-height: 1rem;
        }

        /* Strength */
        .strength-bars { display: flex; gap: 4px; margin-top: 0.45rem; }
        .sbar { flex: 1; height: 3px; border-radius: 2px; background: var(--border); transition: background 0.3s; }

        .btn-update {
            width: 100%; padding: 0.9rem;
            background: linear-gradient(135deg, var(--accent), #6e5cf6);
            border: none; border-radius: 12px; color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700; font-size: 0.88rem;
            cursor: pointer; transition: all 0.22s;
            display: flex; align-items: center; justify-content: center; gap: 0.45rem;
            margin-top: 0.5rem;
            box-shadow: 0 4px 16px rgba(79,124,255,0.28);
        }
        .btn-update:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(79,124,255,0.42); }
        .btn-update:active { transform: scale(0.985); }
        .btn-update:disabled { opacity: 0.55; transform: none; cursor: not-allowed; }
    </style>
</head>
<body>
<div class="bg-glow g1"></div>
<div class="bg-glow g2"></div>
<div class="bg-grid"></div>

<div class="wrapper">
    <div class="card">
        <div class="icon-wrap">🔑</div>
        <div class="card-title">Set New Password</div>
        <div class="card-sub">Choose a strong password for your account. It must be at least 6 characters.</div>

        {% with msgs = get_flashed_messages(with_categories=true) %}
            {% for cat, msg in msgs %}
            <div class="flash-msg flash-{{ cat }}">
                <i class="bi bi-{{ 'check-circle-fill' if cat=='success' else 'exclamation-circle-fill' }}"></i>
                {{ msg }}
            </div>
            {% endfor %}
        {% endwith %}

        <form action="/reset_password_action" method="POST" id="resetForm">
            <input type="hidden" name="token" value="{{ token }}">
            <div class="form-group">
                <label>New Password</label>
                <div class="input-wrap">
                    <i class="bi bi-lock field-icon"></i>
                    <input type="password" name="password" id="pwd" placeholder="Min. 6 characters" required minlength="6">
                    <button type="button" class="toggle-pw" onclick="togglePw('pwd','eye1')"><i class="bi bi-eye" id="eye1"></i></button>
                </div>
                <div class="strength-bars">
                    <div class="sbar" id="s1"></div><div class="sbar" id="s2"></div>
                    <div class="sbar" id="s3"></div><div class="sbar" id="s4"></div>
                </div>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-wrap">
                    <i class="bi bi-lock-fill field-icon"></i>
                    <input type="password" name="confirm_password" id="confirm" placeholder="Re-enter password" required>
                    <button type="button" class="toggle-pw" onclick="togglePw('confirm','eye2')"><i class="bi bi-eye" id="eye2"></i></button>
                </div>
                <div class="match-indicator" id="matchInd"></div>
            </div>
            <button type="submit" class="btn-update" id="submitBtn">
                <i class="bi bi-shield-check-fill"></i> Update Password
            </button>
        </form>
    </div>
</div>

<script>
    const pwdEl = document.getElementById('pwd');
    const cfmEl = document.getElementById('confirm');
    const matchInd = document.getElementById('matchInd');
    const bars = ['s1','s2','s3','s4'].map(id => document.getElementById(id));
    const colors = ['#f05454','#f97316','#e8a93c','#34c97a'];

    function togglePw(inputId, iconId) {
        const inp = document.getElementById(inputId);
        const ico = document.getElementById(iconId);
        if (inp.type === 'password') { inp.type = 'text'; ico.className = 'bi bi-eye-slash'; }
        else { inp.type = 'password'; ico.className = 'bi bi-eye'; }
    }

    pwdEl.addEventListener('input', () => {
        const v = pwdEl.value; let s = 0;
        if (v.length >= 6) s++;
        if (v.length >= 10) s++;
        if (/[A-Z]/.test(v) && /[0-9]/.test(v)) s++;
        if (/[^A-Za-z0-9]/.test(v)) s++;
        bars.forEach((b, i) => b.style.background = i < s ? colors[s-1] : 'var(--border)');
        checkMatch();
    });

    cfmEl.addEventListener('input', checkMatch);

    function checkMatch() {
        const p = pwdEl.value, c = cfmEl.value;
        if (!c) { matchInd.innerHTML = ''; return; }
        if (p === c) {
            matchInd.innerHTML = '<i class="bi bi-check-circle-fill" style="color:#34c97a"></i><span style="color:#34c97a">Passwords match</span>';
        } else {
            matchInd.innerHTML = '<i class="bi bi-x-circle-fill" style="color:#f05454"></i><span style="color:#f05454">Passwords do not match</span>';
        }
    }

    document.getElementById('resetForm').addEventListener('submit', (e) => {
        if (pwdEl.value !== cfmEl.value) { e.preventDefault(); return; }
        const btn = document.getElementById('submitBtn');
        btn.innerHTML = '<i class="bi bi-arrow-repeat"></i> Updating...';
        btn.disabled = true;
    });
</script>
<script>
    document.documentElement.style.opacity = '0';
    window.addEventListener('DOMContentLoaded', () => {
        document.documentElement.style.transition = 'opacity 0.4s ease';
        document.documentElement.style.opacity = '1';
    });
</script>
</body>
</html>
